<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu - Ayam Goreng 39</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap");
      body {
        font-family: "Poppins", sans-serif;
      }

      .tab-active {
        background-color: #b59d74 !important;
        color: white !important;
        border-color: #b59d74 !important;
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <div id="header-container"></div>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <button
        onclick="window.history.back()"
        class="text-[#88601B] text-sm font-semibold left-0 gap-1 hover:underline italic mb-6"
      >
        <i class="fas fa-chevron-left text-xs"></i> kembali
      </button>

      <div class="flex justify-center gap-4 mb-10">
        <button
          id="tab-semua"
          onclick="filterMenuToko('semua')"
          class="menu-toko-btn tab-active px-8 py-2 rounded-full border border-[#B59D74] font-semibold transition"
        >
          Semua Menu
        </button>
        <button
          id="tab-terlaris"
          onclick="filterMenuToko('terlaris')"
          class="menu-toko-btn bg-white text-gray-400 px-8 py-2 rounded-full border border-gray-200 font-semibold hover:bg-gray-50 transition"
        >
          Terlaris
        </button>
        <button
          id="tab-rating"
          onclick="filterMenuToko('rating')"
          class="menu-toko-btn bg-white text-gray-400 px-8 py-2 rounded-full border border-gray-200 font-semibold hover:bg-gray-50 transition"
        >
          Top Rating
        </button>
      </div>

      <div
        id="menu-grid-container"
        class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mx-auto"
        style="max-width: 1262px"
      ></div>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
