<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Kita - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'oren-tua': '#EE8F36', 'emas-teks': '#78450E' },
                    backgroundImage: {
                        'emas-main': 'linear-gradient(90deg, #BFA370 39%, #8E754A 82%)',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }

        body { background: #F5F5F5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .chat-header {
            background: linear-gradient(90deg, #BFA370 0%, #8E754A 100%);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* Shell */
        .chat-shell {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: white;
        }

        /* Contact List */
        .contact-col {
            width: 280px;
            flex-shrink: 0;
            border-right: 1px solid #F0EDE8;
            display: flex;
            flex-direction: column;
            background: white;
        }

        /* Contact item */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #F8F5F1;
            transition: background 0.15s;
        }
        .contact-item:hover { background: #FAF7F3; }
        .contact-item.active { background: #F3EDE3; }

        /* Chat window */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #FAFAF9;
        }

        /* Chat header (window) */
        .chat-win-header {
            padding: 14px 20px;
            background: white;
            border-bottom: 1px solid #F0EDE8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-thumb { background: #D6C9B0; border-radius: 99px; }

        /* Date divider */
        .date-divider {
            text-align: center;
        }
        .date-divider span {
            background: #E8E3DA;
            color: #888;
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 99px;
        }

        /* Bubble from store (left) */
        .bubble-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 55%;
        }
        .bubble-left .bubble-body {
            background: white;
            border-radius: 4px 14px 14px 14px;
            padding: 11px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            font-size: 14px;
            color: #333;
            line-height: 1.55;
        }
        .bubble-left .bubble-time {
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
            padding-left: 4px;
        }

        /* Bubble from me (right) */
        .bubble-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            max-width: 55%;
            align-self: flex-end;
        }
        .bubble-right .bubble-body {
            background: #EDE4D6;
            border-radius: 14px 4px 14px 14px;
            padding: 11px 16px;
            font-size: 14px;
            color: #333;
            line-height: 1.55;
        }
        .bubble-right .bubble-time {
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
            padding-right: 4px;
        }

        /* Input area */
        .input-area {
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #F0EDE8;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .msg-input {
            flex: 1;
            border: 1px solid #E8E3DA;
            border-radius: 24px;
            padding: 11px 18px;
            font-size: 14px;
            outline: none;
            background: #FAFAF8;
            color: #333;
            transition: border-color 0.2s;
            font-family: 'Poppins', sans-serif;
        }
        .msg-input:focus { border-color: #BFA370; background: white; }
        .send-btn {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #BFA370, #8E754A);
            color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none;
            transition: opacity 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:active { transform: scale(0.92); }

        /* Search input */
        .search-input {
            border: 1px solid #E8E3DA;
            border-radius: 8px;
            padding: 7px 10px 7px 32px;
            font-size: 12px;
            outline: none;
            width: 100%;
            background: #FAFAF8;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #BFA370; }

        /* Filter select */
        .filter-select {
            border: 1px solid #E8E3DA;
            border-radius: 8px;
            padding: 7px 8px;
            font-size: 11px;
            outline: none;
            background: white;
            cursor: pointer;
            color: #555;
            font-family: 'Poppins', sans-serif;
        }

        /* Online dot */
        .online-dot {
            width: 8px; height: 8px;
            background: #22C55E;
            border-radius: 50%;
            display: inline-block;
        }

        /* No scrollbar */
        .no-scroll::-webkit-scrollbar { display: none; }
        .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<!-- Top Header -->
<div class="chat-header">
    <button onclick="history.back()" class="text-white hover:opacity-75 transition">
        <i class="ri-arrow-left-line text-xl"></i>
    </button>
    <h1 class="text-white font-bold text-lg">Chat <span class="bg-white/25 text-white text-sm font-semibold px-2 py-0.5 rounded-full ml-1" id="chat-count">7</span></h1>
</div>

<!-- Main Shell -->
<div class="chat-shell">

    <!-- Contact List -->
    <div class="contact-col">
        <!-- Search + Filter -->
        <div class="flex items-center gap-2 px-3 py-3 border-b border-gray-100">
            <div class="relative flex-1">
                <i class="ri-search-line absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input class="search-input" placeholder="Cari nama" id="search-contact" oninput="filterContacts()">
            </div>
            <select class="filter-select" onchange="filterContacts()">
                <option>Semua</option>
                <option>Belum Baca</option>
                <option>Sudah Baca</option>
            </select>
        </div>

        <!-- List -->
        <div class="overflow-y-auto flex-1 no-scroll" id="contact-list"></div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window">
        <!-- Window Header -->
        <div class="chat-win-header">
            <img id="win-avatar" src="assets/images/makanan2.png"
                 onerror="this.src='https://placehold.co/40x40/BFA370/fff?text=A'"
                 class="w-10 h-10 rounded-full object-cover border border-[#E8E3DA]">
            <div>
                <p id="win-name" class="font-semibold text-gray-800 text-sm">Ayam Goreng 39</p>
                <div class="flex items-center gap-2 mt-0.5">
                    <span class="online-dot"></span>
                    <span class="text-xs text-green-500 font-medium">Online</span>
                    <span class="text-gray-200 text-xs">|</span>
                    <i class="ri-star-fill text-yellow-400 text-xs"></i>
                    <span class="text-xs text-gray-500 font-medium" id="win-rating">4.8</span>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="messages-area"></div>

        <!-- Input -->
        <div class="input-area">
            <input class="msg-input" id="msg-input" placeholder="Tulis pesan..."
                   onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }">
            <button class="send-btn" onclick="sendMessage()">
                <i class="ri-send-plane-2-fill text-lg"></i>
            </button>
        </div>
    </div>

</div>

<script src="js/script.js"></script>
<script>
// ================================================================
// DATA
// ================================================================

const contacts = [
    { id: 1, nama: 'Ayam Goreng 39',  preview: 'Bisa kak',                          waktu: 'Kemarin', avatar: 'assets/images/makanan2.png', rating: 4.8, unread: 0, aktif: true  },
    { id: 2, nama: 'Ayam Goreng 39',  preview: 'Untuk pesanan ayam goreng paha atas...', waktu: 'Kemarin', avatar: 'assets/images/makanan2.png', rating: 4.8, unread: 2, aktif: false },
    { id: 3, nama: 'Ayam Goreng 39',  preview: 'Untuk pesanan ayam goreng paha atas...', waktu: 'Kemarin', avatar: 'assets/images/makanan2.png', rating: 4.8, unread: 0, aktif: false },
    { id: 4, nama: 'Ayam Goreng 39',  preview: 'Untuk pesanan ayam goreng paha atas...', waktu: 'Kemarin', avatar: 'assets/images/makanan2.png', rating: 4.8, unread: 1, aktif: false },
    { id: 5, nama: 'Ayam Goreng 39',  preview: 'Untuk pesanan ayam goreng paha atas...', waktu: 'Kemarin', avatar: 'assets/images/makanan2.png', rating: 4.8, unread: 0, aktif: false },
    { id: 6, nama: 'Ayam Goreng 39',  preview: 'Untuk pesanan ayam goreng paha atas...', waktu: 'Kemarin', avatar: 'assets/images/makanan2.png', rating: 4.8, unread: 0, aktif: false },
    { id: 7, nama: 'Ayam Goreng 39',  preview: 'Untuk pesanan ayam goreng paha atas...', waktu: 'Kemarin', avatar: 'assets/images/makanan2.png', rating: 4.8, unread: 0, aktif: false },
];

// Messages per contact id
const messagesDB = {
    1: [
        { tipe: 'date', label: 'Kemarin' },
        { tipe: 'left',  text: 'Untuk pesanan ayam goreng paha atas, Ayam sama nasinya bisa di pisah nggk ya?', waktu: '12.24' },
        { tipe: 'right', text: 'Bisa kak', waktu: '12.24' },
    ],
    2: [
        { tipe: 'date', label: 'Kemarin' },
        { tipe: 'left',  text: 'Untuk pesanan ayam goreng paha atas, gimana pesanannya?', waktu: '11.30' },
    ],
    3: [
        { tipe: 'date', label: 'Kemarin' },
        { tipe: 'right', text: 'Kak, pesanannya sudah siap belum?', waktu: '10.00' },
        { tipe: 'left',  text: 'Sebentar ya kak, masih dalam proses.', waktu: '10.05' },
    ],
    4: [
        { tipe: 'date', label: 'Kemarin' },
        { tipe: 'left',  text: 'Halo kak, ada yang bisa kami bantu?', waktu: '09.00' },
    ],
    5: [
        { tipe: 'date', label: 'Kemarin' },
        { tipe: 'right', text: 'Min, tolong tambah sambalnya ya.', waktu: '14.00' },
        { tipe: 'left',  text: 'Siap kak!', waktu: '14.02' },
    ],
    6: [
        { tipe: 'date', label: 'Kemarin' },
        { tipe: 'left',  text: 'Terima kasih sudah memesan di toko kami!', waktu: '16.00' },
    ],
    7: [
        { tipe: 'date', label: 'Kemarin' },
        { tipe: 'right', text: 'Berapa lama estimasi pengiriman?', waktu: '13.00' },
        { tipe: 'left',  text: 'Sekitar 15-20 menit kak.', waktu: '13.03' },
    ],
};

let activeId = 1;

// ================================================================
// RENDER
// ================================================================

function renderContacts(list) {
    const el = document.getElementById('contact-list');
    el.innerHTML = list.map(c => `
        <div class="contact-item ${c.aktif ? 'active' : ''}" onclick="selectContact(${c.id})">
            <div class="relative flex-shrink-0">
                <img src="${c.avatar}" onerror="this.src='https://placehold.co/44x44/BFA370/fff?text=${c.nama[0]}'"
                     class="w-11 h-11 rounded-full object-cover border border-gray-100">
                ${c.unread > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">${c.unread}</span>` : ''}
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                    <p class="font-semibold text-gray-800 text-sm truncate">${c.nama}</p>
                    <span class="text-[10px] text-gray-400 flex-shrink-0 ml-2">${c.waktu}</span>
                </div>
                <p class="text-xs text-gray-500 truncate mt-0.5">${c.preview}</p>
            </div>
        </div>
    `).join('');
}

function renderMessages(id) {
    const msgs = messagesDB[id] || [];
    const el = document.getElementById('messages-area');
    el.innerHTML = msgs.map(m => {
        if (m.tipe === 'date') {
            return `<div class="date-divider"><span>${m.label}</span></div>`;
        }
        if (m.tipe === 'left') {
            return `
                <div class="bubble-left">
                    <div class="bubble-body">${m.text}</div>
                    <span class="bubble-time">${m.waktu}</span>
                </div>`;
        }
        if (m.tipe === 'right') {
            return `
                <div class="bubble-right">
                    <div class="bubble-body">${m.text}</div>
                    <span class="bubble-time">${m.waktu}</span>
                </div>`;
        }
        return '';
    }).join('');
    // Scroll to bottom
    el.scrollTop = el.scrollHeight;
}

function updateWindowHeader(id) {
    const c = contacts.find(x => x.id === id);
    if (!c) return;
    document.getElementById('win-name').textContent   = c.nama;
    document.getElementById('win-rating').textContent = c.rating;
    const avatar = document.getElementById('win-avatar');
    avatar.src = c.avatar;
    avatar.onerror = () => { avatar.src = `https://placehold.co/40x40/BFA370/fff?text=${c.nama[0]}`; };
}

// ================================================================
// INTERACTIONS
// ================================================================

function selectContact(id) {
    contacts.forEach(c => {
        c.aktif = c.id === id;
        if (c.id === id) c.unread = 0; // clear unread
    });
    activeId = id;
    renderContacts(contacts);
    renderMessages(id);
    updateWindowHeader(id);
    updateChatCount();
}

function filterContacts() {
    const q = (document.getElementById('search-contact')?.value || '').toLowerCase();
    const filtered = contacts.filter(c => c.nama.toLowerCase().includes(q));
    renderContacts(filtered);
}

function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + '.' + now.getMinutes().toString().padStart(2,'0');

    // Add to DB
    if (!messagesDB[activeId]) messagesDB[activeId] = [];
    messagesDB[activeId].push({ tipe: 'right', text, waktu: time });

    // Update contact preview
    const c = contacts.find(x => x.id === activeId);
    if (c) c.preview = text;

    input.value = '';
    renderMessages(activeId);
    renderContacts(contacts);

    // Simulate reply after 1s
    setTimeout(() => {
        const replies = ['Siap kak!', 'Oke kak, noted!', 'Baik kak, akan kami proses.', 'Terima kasih pesanannya kak!', 'Sebentar ya kak.'];
        const reply = replies[Math.floor(Math.random() * replies.length)];
        const replyTime = new Date().getHours().toString().padStart(2,'0') + '.' + new Date().getMinutes().toString().padStart(2,'0');
        messagesDB[activeId].push({ tipe: 'left', text: reply, waktu: replyTime });
        const cc = contacts.find(x => x.id === activeId);
        if (cc) cc.preview = reply;
        renderMessages(activeId);
        renderContacts(contacts);
    }, 1000 + Math.random() * 800);
}

function updateChatCount() {
    const total = contacts.reduce((acc, c) => acc + (c.unread || 0), 0);
    document.getElementById('chat-count').textContent = total > 0 ? total : contacts.length;
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
    renderContacts(contacts);
    renderMessages(activeId);
    updateWindowHeader(activeId);
    updateChatCount();
});
</script>
</body>
</html>
