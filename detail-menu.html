<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Menu - Market Kita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <button
    onclick="window.history.back()"
    class="text-black absolute top-6 left-6 z-10 w-10 h-10 text-gray-600 hover:bg-gray-50 transition-colors"
  >
    <i class="ri-arrow-left-line text-3xl"></i>
  </button>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div
      class="bg-[#F5F5F5] rounded-md max-w-4xl w-full overflow-hidden relative flex flex-col md:flex-row p-6 md:p-8 gap-8"
    >
      <div class="w-full md:w-1/2 h-[300px] md:h-[450px]">
        <img
          src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=1000&auto=format&fit=crop"
          alt="Makan MBG Gratis"
          class="w-full h-full object-cover rounded-[1rem]"
        />
      </div>

      <div class="w-full md:w-1/2 flex flex-col">
        <div class="flex justify-between items-start">
          <h1 class="text-3xl font-bold text-[#4A3933]">Makan MBG Gratis</h1>
          <div class="flex items-center gap-1.5 text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">
            <i class="ri-heart-line"></i>
            <span class="text-xs font-medium">1828</span>
          </div>
        </div>

        <div class="flex items-center text-yellow-400">
          <i class="ri-star-s-fill"></i>
          <i class="ri-star-s-fill"></i>
          <i class="ri-star-s-fill"></i>
          <i class="ri-star-s-fill"></i>
          <i class="ri-star-s-fill"></i>
          <span class="ml-2 w-4 h-3 bg-green-600 text-white text-[8px] rounded-full flex items-center justify-center">
            6
          </span>
        </div>

        <div class="mt-4 flex items-center gap-3">
          <div class="bg-gradient-to-r from-[#ECDB9D] to-[#FFC800] px-4 py-2 rounded-md shadow-sm">
            <span class="text-2xl font-black text-[#4A3933]">Rp15.000</span>
            <span class="text-[#585858] line-through font-semibold text-[12px]">Rp20.000</span>
          </div>
        </div>

        <div class="mt-6 space-y-4 overflow-y-auto max-h-[200px] pr-2">
          <div>
            <h3 class="font-bold text-[#4A3933] text-lg">Deskripsi Rasa</h3>
            <p class="text-gray-400 text-sm leading-relaxed">
              Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed interdum sit amet nulla sit amet condimentum.
            </p>
          </div>
          <div>
            <h3 class="font-bold text-[#4A3933] text-lg">Bahan Utama</h3>
            <p class="text-gray-400 text-sm leading-relaxed">
              Makanan ini mengandung Seafood, Nori, dan Nasi Jepang berkualitas tinggi.
            </p>
          </div>
        </div>

        <div class="mt-6">
          <h3 class="font-bold text-[#4A3933] text-sm mb-2">Tambahkan Catatan</h3>
          <div class="relative">
            <i class="ri-file-list-3-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input
              type="text"
              placeholder="Tulis catatan di sini..."
              class="w-full bg-[#F9F9F9] border border-gray-200 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none"
            />
          </div>
        </div>

        <div class="mt-auto pt-6 flex items-center justify-between gap-4">
          <div class="flex items-center bg-[#E5E5E5] rounded-lg p-1">
            <button onclick="changeQty(-1)" class="w-8 h-8 font-bold text-xl text-gray-600">-</button>
            <span id="qty" class="w-10 text-center font-bold text-[#4A3933]">3</span>
            <button onclick="changeQty(1)" class="w-8 h-8 font-bold text-xl text-gray-600">+</button>
          </div>
          <button
            class="flex-1 bg-[#633A07] text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform"
          >
            Tambahkan Pesanan
          </button>
        </div>
      </div>
    </div>

    <script>
      function changeQty(val) {
        const el = document.getElementById("qty");
        let current = parseInt(el.innerText);
        current += val;
        if (current < 1) current = 1;
        el.innerText = current;
      }
    </script>
  </body>
</html>
