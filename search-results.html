<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasil Pencarian - Market Kita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "oren-tua": "#EE8F36",
              "emas-teks": "#78450E",
            },
            backgroundImage: {
              "emas-main": "linear-gradient(90deg, #BFA370 39%, #8E754A 82%)",
            },
          },
        },
      };
    </script>

    <style>
      * { font-family: "Poppins", sans-serif; }
      .card-shadow { box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05); }
    </style>
  </head>

  <body class="bg-[#FDFDFD]">
    <div id="header-container"></div>

    <main class="max-w-[1440px] mx-auto px-10 py-10 space-y-12">
      <section>
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-[32px] font-semibold text-[#78450E]">Toko</h2>
          <a href="#" class="flex items-center gap-2 text-[#BFA370] font-medium hover:text-[#8E754A] transition-colors">
            Lihat Selengkapnya <i class="ri-arrow-right-s-line"></i>
          </a>
        </div>

        <div class="grid grid-cols-4 gap-6">
          <script>
            for (let i = 1; i <= 4; i++) {
              document.write(`
                <a href="profil-toko.html" class="bg-white rounded-2xl overflow-hidden card-shadow p-3 border border-gray-50 transition-transform hover:-translate-y-1 cursor-pointer">
                  <img src="assets/images/makanan2.png" class="w-full h-40 object-cover rounded-xl mb-3" alt="Toko" />
                  <div class="px-2">
                    <h3 class="font-bold text-lg text-gray-800">Ayam Goreng 39</h3>
                    <p class="text-xs text-gray-400 mb-2">Jl. Limau Tenggara no. 45</p>
                    <div class="flex items-center gap-1 mb-3">
                      <i class="ri-star-fill text-yellow-400"></i><i class="ri-star-fill text-yellow-400"></i><i class="ri-star-fill text-yellow-400"></i><i class="ri-star-fill text-yellow-400"></i><i class="ri-star-fill text-yellow-400"></i>
                      <span class="bg-green-500 text-white text-[10px] px-1.5 rounded-full ml-1">5</span>
                    </div>
                    <div class="flex items-center justify-between text-[10px] text-gray-400 border-t pt-3">
                      <span>10RB+ terjual</span>
                      <span>240m | 15min</span>
                    </div>
                   <div class="flex items-center gap-1 mt-2 text-[10px] font-medium transition-colors">
  <div class="cursor-pointer" onclick="event.preventDefault(); event.stopPropagation(); toggleLike(this)">
    <i class="ri-heart-3-line text-gray-300 text-sm transition-all duration-300 hover:text-red-500"></i>
  </div>
  <span class="text-gray-400">Disukai oleh 1341</span>
</div>
                  </div>
                </a>
              `);
            }
          </script>
        </div>
      </section>

      <section>
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-[32px] font-semibold text-[#78450E]">Menu</h2>
          <a href="#" class="flex items-center gap-2 text-[#BFA370] font-medium hover:text-[#8E754A] transition-colors">
            Lihat Selengkapnya <i class="ri-arrow-right-s-line"></i>
          </a>
        </div>

        <div class="grid grid-cols-3 gap-6">
          <script>
            for (let i = 1; i <= 3; i++) {
              document.write(`
                <div class="bg-white rounded-2xl p-3 card-shadow flex gap-4 border border-gray-50 transition-transform hover:-translate-y-1 cursor-pointer">
                  <img src="assets/images/makanan2.png" class="w-28 h-28 object-cover rounded-xl" alt="Menu" />
                  <div class="flex-1 flex flex-col justify-between">
                    <div>
                      <h3 class="font-bold text-gray-800">Ayam Goreng Sambal Ijo</h3>
                      <div class="flex items-center gap-1 text-[10px] text-gray-400">
                        <i class="ri-store-2-line"></i> Ayam Goreng 39
                      </div>
                      <p class="text-green-700 font-bold text-lg mt-1">Rp 15.000</p>
                    </div>
                    <div class="flex items-center justify-between">
                      <div class="flex gap-2 text-[10px] text-gray-400">
                        <span>10RB+ terjual</span>
                        <span>|</span>
                        <span>240m</span>
                      </div>
                      <div class="flex flex-col items-center">
  <div class="cursor-pointer group" onclick="event.stopPropagation(); toggleLike(this)">
    <i class="ri-heart-3-line text-gray-300 text-xl transition-all duration-300 hover:text-red-500"></i>
  </div>
  <span class="text-[9px] text-gray-400">1341</span>
</div>
                    </div>
                  </div>
                </div>
              `);
            }
          </script>
        </div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
