
<header id="seller-header" style="background:linear-gradient(90deg,#BFA370 0%,#8E754A 100%);" class="flex items-center h-[70px] justify-between px-5 py-3 sticky top-0 z-40 shadow-md">
    <!-- Left: Hamburger + Logo -->
    <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="text-white text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/20 transition">
            <i class="ri-menu-line"></i>
        </button>
        <div class="flex items-center gap-2">
            <img src="assets/images/logo.png" onerror="this.src='https://placehold.co/36x36/fff/BFA370?text=N'" class="w-9 h-9 rounded-full object-cover border-2 border-white/40">
            <span class="text-white font-bold text-lg tracking-tight">Nyam<span class="font-light">Now</span></span>
        </div>
    </div>

    <!-- Right: Notif + Chat + Profile -->
    <div class="flex items-center gap-4">
        <!-- Notifikasi -->
        <button onclick="goPage('seller-notif.html')" class="relative text-white text-xl hover:text-white/80 transition">
            <i class="ri-notification-3-line"></i>
            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">2</span>
        </button>
        <!-- Chat -->
        <button onclick="goPage('seller-chat.html')" class="relative text-white text-xl hover:text-white/80 transition">
            <i class="ri-chat-3-line"></i>
            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">2</span>
        </button>
        <!-- Profile -->
        <button class="flex items-center gap-2 hover:opacity-80 transition">
            <img src="assets/images/avatar.png" onerror="this.src='https://placehold.co/32x32/fff/BFA370?text=A'" class="w-8 h-8 rounded-full object-cover border-2 border-white/50">
            <span class="text-white text-sm font-medium hidden sm:block">Ayam Labubu</span>
        </button>
    </div>
</header>
