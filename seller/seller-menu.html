<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyamNow Seller — Menu Toko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../assets/css/seller-shared.css">
    <style>
        .menu-row { background: white; border-radius: 14px; border: 1px solid #EEE; padding: 16px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; transition: background 0.2s; }
        .menu-row.stok-habis { background: #E5E5E5; }
        .qty-btn-sm { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #DDD; background: white; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
        .qty-btn-sm:hover { background: #BFA370; color: white; border-color: #BFA370; }
        .dots-menu { position: relative; display: inline-block; }
        .dots-dropdown { position: absolute; right: 0; top: 28px; background: white; border: 1px solid #EEE; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 10; min-width: 100px; display: none; }
        .dots-dropdown.open { display: block; }
        .dots-dropdown button { width: 100%; padding: 10px 14px; text-align: left; font-size: 13px; display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; }
        .dots-dropdown button:hover { background: #F9F6F1; }
    </style>
</head>
<body>

<div id="seller-header-container"></div>
<div class="seller-shell">
<div id="seller-sidebar-container"></div>
<main id="seller-main">

    <div class="flex items-start justify-between mb-6">
        <div>
            <h1 class="page-title">Menu Toko</h1>
            <p class="page-sub">Kelola seluruh menu di toko anda</p>
        </div>
        <button onclick="goPage('seller-tambah-menu.html')" class="btn-gold flex items-center gap-2">
            <i class="ri-add-line"></i> + Tambah Menu
        </button>
    </div>

    <!-- Filter + Search -->
    <div class="flex items-center justify-between mb-5">
        <div class="flex gap-5 border-b border-gray-200 pb-0">
            <button class="filter-tab active" onclick="filterMenu('semua',this)">Semua</button>
            <span class="text-gray-300 self-end pb-1">|</span>
            <button class="filter-tab" onclick="filterMenu('aktif',this)">Aktif <span class="badge-aktif ml-1">3</span></button>
            <span class="text-gray-300 self-end pb-1">|</span>
            <button class="filter-tab" onclick="filterMenu('habis',this)">Habis <span class="badge-habis ml-1">1</span></button>
            <span class="text-gray-300 self-end pb-1">|</span>
            <button class="filter-tab" onclick="goPage('seller-penawaran.html')">Promo/Flash Sale</button>
        </div>
        <div class="flex gap-2">
            <div class="relative">
                <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input class="s-input pl-8 text-sm w-44" placeholder="Cari menu..." id="menu-search" oninput="filterMenu(currentFilter, null)">
            </div>
            <button class="w-9 h-9 rounded-lg border border-[#BFA370] text-[#BFA370] flex items-center justify-center hover:bg-[#F9F6F1]"><i class="ri-filter-line"></i></button>
        </div>
    </div>

    <!-- Menu List -->
    <div id="menu-list" class="space-y-3"></div>

</main>
</div>

<script src="../js/seller-shared.js"></script>
<script>
let currentFilter = 'semua';

const menuItems = [
    { id:1, nama:'Nasgor Goreng', harga:'Rp17.000', waktu:'15min', terjual:'10RB+', suka:741, stok:20, status:'aktif' },
    { id:2, nama:'Nasgor Goreng', harga:'Rp17.000', waktu:'15min', terjual:'10RB+', suka:741, stok:0,  status:'habis' },
    { id:3, nama:'Nasgor Goreng', harga:'Rp17.000', waktu:'15min', terjual:'10RB+', suka:741, stok:20, status:'aktif' },
    { id:4, nama:'Nasgor Goreng', harga:'Rp17.000', waktu:'15min', terjual:'10RB+', suka:741, stok:20, status:'aktif' },
];

function filterMenu(f, btn) {
    if (f) currentFilter = f;
    if (btn) {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
    }
    const q = (document.getElementById('menu-search')?.value || '').toLowerCase();
    const filtered = menuItems.filter(m => {
        const matchF = currentFilter === 'semua' || m.status === currentFilter;
        const matchQ = m.nama.toLowerCase().includes(q);
        return matchF && matchQ;
    });
    renderMenuList(filtered);
}

function renderMenuList(items) {
    const el = document.getElementById('menu-list');
    el.innerHTML = items.map(m => `
        <div class="card shadow-soft p-4 flex items-center gap-4 ${m.stok === 0 ? 'bg-gray-200' : ''}" id="menu-row-${m.id}">
            <img src="../assets/images/makanan2.png" onerror="this.src='https://placehold.co/72x72/f3f3f3/BFA370?text=🍗'" class="w-16 h-16 rounded-xl object-cover flex-shrink-0 ${m.stok===0?'grayscale opacity-70':''}">
            <div class="flex-1">
                <p class="font-semibold text-gray-800">${m.nama}</p>
                <p class="text-[#BFA370] font-bold text-sm">${m.harga}</p>
                <p class="text-xs text-gray-400 mt-0.5">${m.waktu}</p>
                <p class="text-xs text-gray-400">${m.terjual} terjual · Disukai oleh ${m.suka}</p>
            </div>
            <!-- Qty Control -->
            <div class="flex flex-col items-center gap-1">
                <div class="flex items-center gap-2">
                    <button class="qty-btn-sm" onclick="changeMenuQty(${m.id},-1)">−</button>
                    <span id="qty-${m.id}" class="w-8 text-center font-bold text-gray-700 text-sm">${m.stok}</span>
                    <button class="qty-btn-sm" onclick="changeMenuQty(${m.id},1)">+</button>
                </div>
                <p class="text-[10px] text-gray-400">Stok hari ini <i class="ri-question-line"></i></p>
            </div>
            <!-- Simpan + Dots -->
            <div class="flex flex-col items-end gap-2 flex-shrink-0">
                <button class="btn-gold text-xs px-4 py-2" onclick="simpanMenu(${m.id})">Simpan Perubahan</button>
                <div class="dots-menu">
                    <button onclick="toggleDots(${m.id})" class="text-gray-400 hover:text-gray-600 px-1">•••</button>
                    <div class="dots-dropdown" id="dots-${m.id}">
                        <button onclick="goPage('seller-tambah-menu.html?edit=${m.id}')" class="gap-2"><i class="ri-pencil-line text-gray-400"></i> Edit</button>
                        <button onclick="hapusMenu(${m.id})" class="text-red-500 gap-2"><i class="ri-delete-bin-line"></i> Hapus</button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

function changeMenuQty(id, d) {
    const el = document.getElementById('qty-' + id);
    const val = Math.max(0, parseInt(el.textContent) + d);
    el.textContent = val;
}

function simpanMenu(id) {
    const qty = document.getElementById('qty-' + id)?.textContent;
    alert('Stok tersimpan: ' + qty);
}

function toggleDots(id) {
    document.querySelectorAll('.dots-dropdown').forEach(dd => {
        if (dd.id !== 'dots-' + id) dd.classList.remove('open');
    });
    document.getElementById('dots-' + id)?.classList.toggle('open');
}

function hapusMenu(id) {
    if (confirm('Hapus menu ini?')) {
        menuItems.splice(menuItems.findIndex(m => m.id === id), 1);
        filterMenu(null, null);
    }
}

document.addEventListener('click', e => {
    if (!e.target.closest('.dots-menu')) {
        document.querySelectorAll('.dots-dropdown').forEach(d => d.classList.remove('open'));
    }
});

document.addEventListener('DOMContentLoaded', () => filterMenu('semua', null));
</script>
</body>
</html>
